<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yumurcak TV - Canlı Yayın</title>
    <style>
        body { 
            background: #1a1a1a; 
            color: white; 
            font-family: 'Arial', sans-serif; 
            text-align: center; 
            margin: 0;
            padding: 20px;
        }
        h1 { color: #ff0000; text-shadow: 2px 2px #000; }
        
        /* TV Kasası Tasarımı */
        .tv-container {
            max-width: 800px;
            margin: 20px auto;
            padding: 15px;
            background: #333;
            border: 12px solid #444;
            border-radius: 30px;
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.3);
            position: relative;
        }

        /* Video Alanı */
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Ekran Oranı */
            height: 0;
            overflow: hidden;
            border-radius: 10px;
            background: #000;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Kanal Düğmeleri */
        .tv-controls {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .channel-btn {
            background: #444;
            color: white;
            border: 2px solid #555;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }
        .channel-btn:hover {
            background: #ff0000;
            border-color: #fff;
        }

        .back-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 10px 20px;
            background: #fff;
            color: #000;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>🔴 YUMU TV CANLI</h1>
    <p>YouTube'a gitmeden izle!</p>

    <div class="tv-container">
        <div class="video-wrapper">
            <iframe id="tvPlayer" src="https://www.youtube.com/embed/QNcuxXA4x-U?autoplay=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>

        <div class="tv-controls">
            <button class="channel-btn" onclick="degistir('QNcuxXA4x-U')">📺 Bölüm 1</button>
            <button class="channel-btn" onclick="degistir('S8S8S8S8S8S')">📺 Bölüm 2</button>
            <button class="channel-btn" onclick="degistir('X9X9X9X9X9X')">📺 Bölüm 3</button>
        </div>
    </div>

    <br>
    <a href="index.html" class="back-btn">🏠 Ana Sayfaya Dön</a>

    <script>
        function degistir(videoID) {
            var player = document.getElementById('tvPlayer');
            player.src = "https://www.youtube.com/embed/" + videoID + "?autoplay=1";
        }
    </script>

</body>
</html>
