<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yumu TV - Playlist & Legends</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* TÜM SARI ÇİZGİLER VE GEREKSİZ KENARLIKLAR SİLİNDİ */
        body {
            background: #050505; 
            color: white;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            border: none !important;
        }

        .tv-frame {
            max-width: 950px;
            margin: 0 auto;
            background: #111;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            border: none !important;
        }

        .video-box {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 12px;
            background: black;
        }

        .video-box iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .channel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-top: 25px;
        }

        .tv-btn {
            background: #1a1a1a;
            color: #ccc;
            border: 1px solid #333;
            padding: 15px 10px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 0.9em;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        /* Playlist Butonları (Yeşil) */
        .btn-playlist {
            background: #004d40;
            border-color: #00695c;
        }

        /* Efsane Şarkı Butonu (Altın/Sarı Tonu ama Çizgi Değil!) */
        .btn-legend {
            background: #b8860b;
            border-color: #daa520;
            color: white;
        }

        .tv-btn:hover {
            background: #e50914;
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(229, 9, 20, 0.4);
        }

        .home-btn {
            margin-top: 40px;
            display: inline-block;
            color: #555;
            text-decoration: none;
            font-size: 0.9em;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <h1 style="margin-bottom: 30px; font-weight: 900;">
        <span style="color: #ff0000;">YUMU</span> TV <span style="font-weight: 100; color: #444;">|</span> LEGENDS
    </h1>

    <div class="tv-frame">
        <div class="video-box">
            <iframe id="tvPlayer" src="https://www.youtube.com/embed/videoseries?list=PLZxHtN95t-ob1f0wl_4vNLgn7rNicNxSn" allowfullscreen></iframe>
        </div>

        <div class="channel-grid">
            <button class="tv-btn btn-playlist" onclick="playVideo('S7M80Y9-L6M')">
                <span>⚽</span> Spor 1
            </button>
            <button class="tv-btn btn-playlist" onclick="playVideo('7qX_qP6E6lM')">
                <span>⚽</span> Spor 2
            </button>
            
            <button class="tv-btn btn-legend" onclick="playVideo('dQw4w9WgXcQ')">
                <span>🎵</span> NEVER GONNA GIVE YOU UP
            </button>
            
            <button class="tv-btn" onclick="playVideo('Z7y4H2S1X8k')">
                <span>📰</span> Haber
            </button>
            <button class="tv-btn" onclick="playVideo('yU9o_2nJj_k')">
                <span>🎮</span> Oyun
            </button>
        </div>
    </div>

    <a href="index.html" class="home-btn">← ANA SAYFAYA DÖN</a>

    <script>
        function playVideo(id) {
            const player = document.getElementById('tvPlayer');
            player.src = "https://www.youtube.com/embed/" + id + "?autoplay=1";
        }
    </script>

</body>
</html>
