<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yumu TV - Canlı Yayın</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: #1a1a1a; /* TV atmosferi için koyu arka plan */
            color: white;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        .tv-container {
            max-width: 800px;
            margin: 0 auto;
            background: #333;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.3);
            border: 10px solid #444;
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Oranı */
            height: 0;
            overflow: hidden;
            border-radius: 10px;
            background: black;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .channel-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }

        .channel-btn {
            background: #cc0000;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            font-size: 1em;
            box-shadow: 0 4px 0 #880000;
        }

        .channel-btn:hover {
            background: #ff0000;
            transform: scale(1.05);
        }

        .channel-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        .back-home {
            margin-top: 30px;
            display: inline-block;
            color: #aaa;
            text-decoration: none;
            font-size: 0.9em;
        }
    </style>
</head>
<body>

    <h1 style="color: #ff0000; text-shadow: 2px 2px black;">📺 YUMU TV CANLI</h1>

    <div class="tv-container">
        <div class="video-wrapper">
            <iframe id="mainPlayer" src="https://www.youtube.com/embed/S7M80Y9-L6M" allowfullscreen></iframe>
        </div>

        <div class="channel-list">
            <button class="channel-btn" onclick="kanalDegistir('S7M80Y9-L6M')">⚽ Spor Kanalı</button>
            <button class="channel-btn" onclick="kanalDegistir('Z7y4H2S1X8k')">📰 Haber Kanalı</button>
            <button class="channel-btn" onclick="kanalDegistir('dQw4w9WgXcQ')">🎬 Belgesel Kuşağı</button>
            <button class="channel-btn" onclick="kanalDegistir('yU9o_2nJj_k')">🎮 Oyun Dünyası</button>
        </div>
    </div>

    <a href="index.html" class="back-home">← Ana Sayfaya Dön</a>

    <script>
        function kanalDegistir(videoID) {
            const player = document.getElementById('mainPlayer');
            // Videoyu otomatik başlatmak için autoplay ekliyoruz
            player.src = "https://www.youtube.com/embed/" + videoID + "?autoplay=1";
        }
    </script>

</body>
</html>
